# Configuration for fine-tuning Moonshine on MLS Italian (no curriculum learning)
# Dataset: facebook/multilingual_librispeech - italian
# Duration range: 4-20s

model:
  name: "UsefulSensors/moonshine-tiny"
  freeze_encoder: false

dataset:
  type: "mls"
  language: "italian"
  split_train: "train"
  split_test: "test"

audio:
  sampling_rate: 16000
  max_duration: 20.0
  min_duration: 4.0

preprocessing:
  num_proc: 4
  normalize_audio: true
  target_rms: 0.075

curriculum:
  enabled: false

training:
  output_dir: "./results-moonshine-it-no-curriculum"

  # GPU-safe settings for RTX 2060 (6GB VRAM)
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 16  # Effective batch size = 4 * 16 = 64
  gradient_checkpointing: true
  fp16: false
  bf16: true                       # BF16 more stable than FP16 on ROCm/AMD
  fp16_full_eval: false
  bf16_full_eval: true
  max_grad_norm: 1.0

  max_steps: 8000

  optim: "schedule_free_adamw"
  learning_rate: 3.0e-4
  lr_scheduler_type: "constant_with_warmup"
  warmup_steps: 256

  eval_strategy: "steps"
  eval_steps: 500
  save_steps: 500
  logging_steps: 50
  predict_with_generate: true

  load_best_model_at_end: true
  metric_for_best_model: "wer"
  greater_is_better: false

  report_to: ["tensorboard"]
  logging_dir: "./logs/moonshine-it-no-curriculum"

  push_to_hub: false
  hub_model_id: null
  hub_strategy: "every_save"
  hub_token: null

generation:
  max_new_tokens: 50
  length_penalty: 1.2
  do_sample: false
  early_stopping: true
  repetition_penalty: 1.3
  num_beams: 5
  no_repeat_ngram_size: 2
