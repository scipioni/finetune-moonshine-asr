# Configuration for fine-tuning Moonshine on MLS French (no curriculum learning)
# Dataset: facebook/multilingual_librispeech - french
# Duration range: 4-20s (mean 7.22s, median 6.98s)

model:
  name: "UsefulSensors/moonshine-tiny"
  freeze_encoder: false

dataset:
  type: "mls"
  language: "french"
  split_train: "train"
  split_test: "test"

audio:
  sampling_rate: 16000
  max_duration: 20.0  # Covers full dataset range (4-19.97s)
  min_duration: 4.0   # Minimum from dataset

preprocessing:
  num_proc: 4
  normalize_audio: true
  target_rms: 0.075

curriculum:
  # Disabled for initial testing - train on all durations at once
  enabled: false

training:
  output_dir: "./results-moonshine-fr-no-curriculum"

  # GPU-safe settings for RTX 2060 (6GB VRAM)
  per_device_train_batch_size: 4   # Conservative for 6GB VRAM
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 16  # Effective batch size = 4 * 16 = 64
  gradient_checkpointing: true     # Reduces VRAM usage
  fp16: false
  bf16: true                       # BF16 more stable than FP16 on ROCm/AMD
  fp16_full_eval: false
  bf16_full_eval: true
  max_grad_norm: 1.0

  # Training length
  max_steps: 8000  # ~2.1 epochs with 60k samples and effective batch 64

  # Optimizer (as per Moonshine paper: schedule-free AdamW + warmup)
  # Paper: 32x H100, batch 1024, LR 1.4e-3, warmup 8192 steps (3.3% of 250K)
  # Our setup: 1x RTX 2060, batch 64, scaled LR, proportional warmup
  optim: "schedule_free_adamw"
  learning_rate: 3.0e-4      # Scaled from paper's 1.4e-3 for smaller batch size
  lr_scheduler_type: "constant_with_warmup"  # Constant LR after warmup
  warmup_steps: 256          # ~3.2% of 8000 steps (proportional to paper)

  # Evaluation
  eval_strategy: "steps"
  eval_steps: 500
  save_steps: 500
  logging_steps: 50
  predict_with_generate: true

  # Model selection
  load_best_model_at_end: true
  metric_for_best_model: "wer"
  greater_is_better: false

  # Logging
  report_to: ["tensorboard"]
  logging_dir: "./logs/moonshine-fr-no-curriculum"

  # Hub
  push_to_hub: false
  hub_model_id: null
  hub_strategy: "every_save"
  hub_token: null

generation:
  max_new_tokens: 50
  length_penalty: 1.2
  do_sample: false
  early_stopping: true
  # Anti-repetition settings
  repetition_penalty: 1.3
  num_beams: 5
  no_repeat_ngram_size: 2
