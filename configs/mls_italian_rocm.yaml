# Fine-tuning Moonshine on MLS Italian — tuned for Ryzen AI Max+ 395 (Strix Halo)
#
# Hardware profile: 40 RDNA 3.5 CUs, 96 GB unified LPDDR5X (~256 GB/s shared)
# Key differences from the NVIDIA config:
#   - fp16: true  — halves memory traffic on a bandwidth-limited iGPU
#   - gradient_checkpointing: false  — 96 GB RAM makes recomputation pointless
#   - larger per-device batch + smaller accumulation  — fills GPU SMs better
#   - larger eval batch  — fast eval already observed; push it further
#   - torch_compile: true  — Inductor fuses the element-wise LayerNorm fallback
#     back into efficient kernels, recovering most of the fused-kernel speedup

model:
  name: "UsefulSensors/moonshine-tiny"
  freeze_encoder: false

dataset:
  type: "mls"
  language: "italian"
  split_train: "train"
  split_test: "test"

audio:
  sampling_rate: 16000
  max_duration: 20.0
  min_duration: 4.0

preprocessing:
  num_proc: 8          # More CPU cores available on Zen 5
  normalize_audio: true
  target_rms: 0.075

curriculum:
  enabled: false

training:
  output_dir: "./results-moonshine-it-rocm"

  per_device_train_batch_size: 8       # 2× NVIDIA — 96 GB allows it
  per_device_eval_batch_size: 64       # Large eval batch for throughput
  gradient_accumulation_steps: 8       # Effective batch = 8×8 = 64 (same as NVIDIA)
  gradient_checkpointing: false        # 96 GB unified memory — no need to recompute
  fp16: true                           # Halves memory traffic; stable after LN FP32 upcast
  bf16: false
  fp16_full_eval: true
  bf16_full_eval: false
  max_grad_norm: 1.0
  torch_compile: true                  # Inductor fuses element-wise ops

  max_steps: 8000

  optim: "schedule_free_adamw"
  learning_rate: 3.0e-4
  lr_scheduler_type: "constant_with_warmup"
  warmup_steps: 256

  eval_strategy: "steps"
  eval_steps: 500
  save_steps: 500
  logging_steps: 50
  predict_with_generate: true

  load_best_model_at_end: true
  metric_for_best_model: "wer"
  greater_is_better: false

  report_to: ["tensorboard"]
  logging_dir: "./logs/moonshine-it-rocm"

  push_to_hub: false
  hub_model_id: null
  hub_strategy: "every_save"
  hub_token: null

generation:
  max_new_tokens: 50
  length_penalty: 1.2
  do_sample: false
  early_stopping: true
  repetition_penalty: 1.3
  num_beams: 5
  no_repeat_ngram_size: 2
